<script>
function apriOrdineSpecificoDaIframe() {
    const mainWindow = window.parent;
    
    if (!mainWindow) {
        console.error("Impossibile accedere alla finestra principale.");
        return;
    }

    const percorsoTarget = '/home/workArea/salesOrder/1';

    // TENTATIVO 1: Modifica diretta dell'URL (Metodo più sicuro per i router basati su #)
    // Se l'ERP usa il sistema dei tab/workarea, questo forza il browser a cambiare rotta.
    try {
        console.log("Tentativo 1: Cambiamo direttamente l'hash della finestra principale...");
        mainWindow.location.hash = '#' + percorsoTarget;
        
        // Se l'URL cambia ma la pagina non si muove, aiutiamo Angular a svegliarsi:
        if (mainWindow.angular) {
            const appElement = mainWindow.document.querySelector('[ng-app]') || mainWindow.document.body;
            const $injector = mainWindow.angular.element(appElement).injector();
            if ($injector && $injector.has('$rootScope')) {
                $injector.get('$rootScope').$apply();
            }
        }
        return; // Se ha successo, ci fermiamo qui
    } catch (e) {
        console.warn("Fallito il tentativo diretto sull'hash, provo con i servizi Angular...", e);
    }

    // TENTATIVO 2: Fallback tramite l'injector di Angular se il primo fallisce
    if (mainWindow.angular) {
        const appElement = mainWindow.document.querySelector('[ng-app]') || mainWindow.document.body;
        const $injector = mainWindow.angular.element(appElement).injector();
        
        if ($injector) {
            const $location = $injector.has('$location') ? $injector.get('$location') : null;
            const $timeout = $injector.has('$timeout') ? $injector.get('$timeout') : null;
            
            if ($location) {
                // Usiamo $timeout per assicurarci di non andare in conflitto con i cicli di update/digest dell'ERP
                const naviga = function() {
                    console.log("Tentativo 2: Navigazione controllata con $location.path");
                    $location.path(percorsoTarget);
                };

                if ($timeout) {
                    $timeout(naviga);
                } else {
                    mainWindow.angular.element(appElement).scope().$apply(naviga);
                }
            }
        }
    }
}
</script>
