<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Link ERP Interno</title>
    <style>
        .btn-erp {
            background-color: #1ab394;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-erp:hover {
            background-color: #18a689;
        }
    </style>
</head>
<body>

    <button type="button" class="btn-erp" onclick="forzaAperturaOrdine()">
        Apri Ordine Cliente #1
    </button>

    <script>
    function forzaAperturaOrdine() {
        const mainWindow = window.parent;
        if (!mainWindow) {
            console.error("Impossibile accedere alla finestra principale.");
            return;
        }

        const percorsoTarget = "/home/workArea/salesOrder/1";

        // STRATEGIA 1: Cambia l'hash e forza l'evento di navigazione del browser
        console.log("Esecuzione Strategia 1: Forzatura Hash URL...");
        mainWindow.location.hash = "#" + percorsoTarget;

        // STRATEGIA 2: Sveglia il router di Angular moderno se la pagina non si è mossa
        // Negli ERP Angular, spesso viene esposto un router globale o si può triggerare l'evento di cambio URL
        try {
            const popStateEvent = new PopStateEvent('popstate');
            mainWindow.dispatchEvent(popStateEvent);
            console.log("Evento popstate lanciato con successo.");
        } catch (e) {
            console.warn("Impossibile lanciare popstate:", e);
        }

        // STRATEGIA 3: Fallback tramite NgZone (se accessibile globalmente nell'app)
        // Molti framework Angular espongono l'applicazione radice per il debug o per tool esterni
        try {
            const appElement = mainWindow.document.querySelector('app-root') || mainWindow.document.querySelector('[ng-version]');
            if (appElement && mainWindow.ng) {
                console.log("Rilevato Angular moderno. Tento il routing interno tramite la Zone...");
                // Recupera il router di Angular dall'elemento DOM
                const router = mainWindow.ng.getComponent(appElement)?.__ngSimpleChanges__ || mainWindow.ng.getInjector(appElement).get(mainWindow.ng.core.Router);
                if (router) {
                    router.navigateByUrl(percorsoTarget);
                    console.log("Navigazione passata al Router di Angular.");
                }
            }
        } catch (err) {
            // Silenzioso, è solo un tentativo di debug avanzato
            console.log("Nota: Struttura 'ng' globale non accessibile (normale in produzione).");
        }
    }
    </script>

</body>
</html>
