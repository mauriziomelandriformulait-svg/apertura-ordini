<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Link ERP Interno</title>
    <style>
        .btn-erp {
            background-color: #1ab394;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-erp:hover {
            background-color: #18a689;
        }
    </style>
</head>
<body>

    <button type="button" class="btn-erp" onclick="inviaMessaggioNavigazione()">
        Apri Ordine Cliente #1
    </button>

    <script>
    function inviaMessaggioNavigazione() {
        const percorsoTarget = "/home/workArea/salesOrder/1";
        
        const payload = {
            type: 'ROUTER_NAVIGATION',
            action: 'navigate',
            url: percorsoTarget,
            route: percorsoTarget
        };

        console.log("Invio comando via postMessage...");

        try {
            // Invia l'oggetto nativo al parent
            window.parent.postMessage(payload, '*');
            // Invia anche come stringa JSON per sicurezza
            window.parent.postMessage(JSON.stringify(payload), '*');
            
            console.log("Messaggio inviato al parent senza blocchi di sicurezza.");
        } catch (e) {
            console.error("Errore nell'invio:", e);
        }
    }
    </script>

</body>
</html>
