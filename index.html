<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Link ERP Interno</title>
    <style>
        .btn-erp {
            background-color: #1ab394;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-erp:hover {
            background-color: #18a689;
        }
    </style>
</head>
<body>

    <button type="button" class="btn-erp" onclick="navigaOrdinePrincipale()">
        Apri Ordine Cliente #1
    </button>

    <script>
    function navigaOrdinePrincipale() {
        const percorsoTarget = "/home/workArea/salesOrder/1";
        
        // STRATEGIA 1: postMessage (Il modo standard in Angular moderno per comunicare dagli iframe)
        // Invia un messaggio formattato sia come stringa che come oggetto (molti ERP intercettano questo)
        try {
            console.log("Tentativo 1: Invio postMessage al parent...");
            const messaggio = {
                action: 'navigate',
                url: percorsoTarget,
                route: percorsoTarget,
                type: 'ROUTER_NAVIGATION'
            };
            
            window.parent.postMessage(messaggio, '*');
            window.parent.postMessage(JSON.stringify(messaggio), '*');
        } catch (e) {
            console.warn("Errore durante il postMessage:", e);
        }

        // STRATEGIA 2: Forzatura tramite window.open sul target '_parent'
        // Se l'ERP usa i percorsi con '#' nell'URL principale, questo ricarica/sposta la finestra madre
        try {
            console.log("Tentativo 2: Forzatura tramite window.open su _parent...");
            
            // Recuperiamo l'origine dell'ERP (es: https://diapdemo.formula.it:8282)
            const urlCompleto = window.parent.location.origin + "/due/#" + percorsoTarget;
            
            // Forza la finestra principale a cambiare indirizzo direttamente
            window.open(urlCompleto, '_parent');
        } catch (e) {
            console.error("Errore durante la navigazione diretta _parent. Potrebbe esserci un blocco di Cross-Origin (CORS):", e);
            
            // Fallback estremo se la sicurezza del browser blocca il punto precedente:
            // Prova a cambiare l'intera location del parent
            try {
                window.parent.location.href = window.parent.location.origin + "/due/#" + percorsoTarget;
            } catch (err) {
                console.error("Anche il fallback estremo è stato bloccato dal browser:", err);
            }
        }
    }
    </script>

</body>
</html>
